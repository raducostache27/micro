<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GI Microbiology Quiz — Dr. Colle</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0d1117;--surface:#161b22;--s2:#1c2330;--border:rgba(255,255,255,.08);
  --border2:rgba(255,255,255,.15);--text:#e6edf3;--muted:#7d8590;--dim:#484f58;
  --green:#2ea043;--green2:#3fb950;--red:#da3633;--red2:#ff7b72;
  --blue:#388bfd;--blue2:#79c0ff;--gold:#d29922;--gold2:#e3b341;
  --purple:#8b5cf6;--teal:#0d9488;--teal2:#5eead4;
  --orange2:#fb923c;--pink:#db2777;--pink2:#f9a8d4;--r:10px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;justify-content:center;padding:2rem 1rem 5rem}
.shell{width:100%;max-width:720px}
.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.4rem}
.brand{font-family:'DM Serif Display',serif;font-size:1.1rem;color:var(--muted)}
.brand span{color:var(--text)}
.scorepill{font-size:.78rem;font-weight:500;color:var(--muted);background:var(--surface);border:1px solid var(--border);padding:4px 13px;border-radius:20px}
.scorepill b{color:var(--text)}
.controls{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:1rem}
.ctrl-lbl{font-size:.72rem;color:var(--dim);font-weight:500;white-space:nowrap}
.ctlgrp{display:flex;gap:5px;flex-wrap:wrap}
.mbtn{font-size:.71rem;font-weight:600;padding:4px 11px;border-radius:20px;border:1px solid var(--border);background:var(--surface);color:var(--dim);cursor:pointer;transition:all .12s;white-space:nowrap;user-select:none}
.mbtn:hover:not(.on){border-color:var(--border2);color:var(--muted)}
.mbtn.on{border-color:rgba(63,185,80,.4);background:rgba(63,185,80,.1);color:var(--green2)}
.ft-struct   {background:rgba(209,117,35,.12)!important;border-color:rgba(209,117,35,.3)!important;color:#fb923c!important}
.ft-culture  {background:rgba(56,139,253,.1)!important;border-color:rgba(56,139,253,.28)!important;color:#79c0ff!important}
.ft-invasion {background:rgba(218,54,51,.1)!important;border-color:rgba(218,54,51,.3)!important;color:#ff7b72!important}
.ft-virulence{background:rgba(139,92,246,.12)!important;border-color:rgba(139,92,246,.3)!important;color:#c4b5fd!important}
.ft-timing   {background:rgba(13,148,136,.1)!important;border-color:rgba(13,148,136,.28)!important;color:#5eead4!important}
.ft-symptoms {background:rgba(219,39,119,.1)!important;border-color:rgba(219,39,119,.28)!important;color:#f9a8d4!important}
.ft-treatment{background:rgba(13,188,186,.1)!important;border-color:rgba(13,188,186,.28)!important;color:#39d0d8!important}
.ft-spread   {background:rgba(210,153,34,.1)!important;border-color:rgba(210,153,34,.28)!important;color:#e3b341!important}
.filterrow{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:1rem}
.chip{font-size:.68rem;font-weight:600;text-transform:uppercase;letter-spacing:.06em;padding:3px 9px;border-radius:20px;border:1px solid var(--border);background:var(--surface);color:var(--dim);cursor:pointer;transition:all .12s;white-space:nowrap;user-select:none}
.chip:hover{border-color:var(--border2);color:var(--muted)}
.chip.on{border-color:rgba(56,139,253,.35);background:rgba(56,139,253,.09);color:var(--blue2)}
.chip.all-on{border-color:rgba(63,185,80,.35);background:rgba(63,185,80,.09);color:var(--green2)}
.qcount-sel{font-size:.72rem;padding:4px 10px;border-radius:20px;border:1px solid var(--border);background:var(--surface);color:var(--muted);cursor:pointer;margin-left:auto}
.qcount-sel option{background:#161b22}
.progrow{display:flex;align-items:center;gap:12px;margin-bottom:1.5rem}
.progtrack{flex:1;height:3px;background:var(--s2);border-radius:99px;overflow:hidden}
.progfill{height:100%;background:var(--green2);border-radius:99px;transition:width .4s cubic-bezier(.4,0,.2,1)}
.qlbl{font-size:.73rem;color:var(--muted);min-width:52px;text-align:right;white-space:nowrap}
.card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:1.75rem 2rem;margin-bottom:1rem}
.tagsrow{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:.9rem}
.cattag{font-size:.68rem;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--blue2);background:rgba(56,139,253,.1);border:1px solid rgba(56,139,253,.22);padding:3px 9px;border-radius:6px}
.focustag{font-size:.63rem;font-weight:600;text-transform:uppercase;letter-spacing:.07em;padding:2px 8px;border-radius:5px}
.qtext{font-size:1.02rem;line-height:1.65;color:var(--text);margin-bottom:1.25rem}
.opts{display:flex;flex-direction:column;gap:7px}
.ob{display:flex;align-items:flex-start;gap:11px;padding:11px 14px;border:1px solid var(--border);border-radius:var(--r);cursor:pointer;background:transparent;color:var(--text);font-family:'DM Sans',sans-serif;font-size:.875rem;line-height:1.5;text-align:left;transition:background .12s,border-color .12s,transform .1s;width:100%}
.ob:hover:not(.locked){background:var(--s2);border-color:var(--border2);transform:translateX(2px)}
.ol{flex-shrink:0;width:22px;height:22px;border-radius:6px;background:var(--s2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:.67rem;font-weight:600;color:var(--dim);transition:all .12s;margin-top:1px}
.ob.correct{background:rgba(46,160,67,.12);border-color:rgba(63,185,80,.5)}
.ob.correct .ol{background:var(--green);border-color:var(--green);color:#fff}
.ob.wrong{background:rgba(218,54,51,.1);border-color:rgba(218,54,51,.4);color:var(--muted)}
.ob.wrong .ol{background:var(--red);border-color:var(--red);color:#fff}
.ob.reveal{background:rgba(46,160,67,.06);border-color:rgba(63,185,80,.25);color:var(--muted)}
.ob.reveal .ol{background:rgba(46,160,67,.3);border-color:transparent;color:var(--green2)}
.exp{display:none;margin-top:.9rem;padding:12px 14px;background:var(--s2);border-left:3px solid var(--green);border-radius:0 var(--r) var(--r) 0;font-size:.82rem;color:var(--muted);line-height:1.7}
.exp.show{display:block;animation:fadeUp .2s ease}
.exp strong{color:var(--text);font-weight:500}
@keyframes fadeUp{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}
.cfooter{display:flex;align-items:center;justify-content:space-between;margin-top:1.1rem}
.scorerow{font-size:.78rem;color:var(--muted)}
.scorerow b{color:var(--text)}
.btnnext{display:none;padding:9px 22px;background:var(--green);color:#fff;font-family:'DM Sans',sans-serif;font-size:.86rem;font-weight:500;border:none;border-radius:var(--r);cursor:pointer;transition:background .12s,transform .1s}
.btnnext:hover{background:var(--green2);transform:translateY(-1px)}
#rscreen{display:none;animation:fadeUp .35s ease}
.rcrd{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:2.5rem 2rem;text-align:center}
.remoji{font-size:2.8rem;display:block;margin-bottom:.8rem}
.rh{font-family:'DM Serif Display',serif;font-size:1.5rem;color:var(--text);margin-bottom:.35rem}
.rsub{font-size:.86rem;color:var(--muted);margin-bottom:1.6rem}
.bigscore{font-size:4rem;font-weight:600;line-height:1;color:var(--green2);margin-bottom:.2rem}
.sdenom{font-size:.88rem;color:var(--muted);margin-bottom:1.5rem}
.statsrow{display:flex;gap:.65rem;justify-content:center;flex-wrap:wrap;margin-bottom:1.5rem}
.sbox{background:var(--s2);border:1px solid var(--border);border-radius:var(--r);padding:.85rem 1.1rem;min-width:100px}
.snum{font-size:1.5rem;font-weight:600;display:block;margin-bottom:2px}
.slbl{font-size:.68rem;color:var(--muted);text-transform:uppercase;letter-spacing:.08em}
.bksection{margin-bottom:1.5rem;text-align:left}
.bktitle{font-size:.72rem;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:.6rem;text-align:center}
.bkrow{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.bkname{font-size:.77rem;color:var(--muted);min-width:140px}
.bkbar-bg{flex:1;height:5px;background:var(--s2);border-radius:3px;overflow:hidden}
.bkbar-fill{height:100%;border-radius:3px;background:var(--green)}
.bkpct{font-size:.72rem;color:var(--dim);min-width:30px;text-align:right}
.fkrow{display:flex;align-items:center;gap:8px;margin-bottom:5px}
.fkname{font-size:.72rem;min-width:80px}
.fkbar-bg{flex:1;height:4px;background:var(--s2);border-radius:3px;overflow:hidden}
.fkbar-fill{height:100%;border-radius:3px}
.fkpct{font-size:.7rem;color:var(--dim);min-width:30px;text-align:right}
.btnrestart{padding:10px 26px;background:var(--s2);color:var(--text);font-family:'DM Sans',sans-serif;font-size:.88rem;font-weight:500;border:1px solid var(--border2);border-radius:var(--r);cursor:pointer;transition:all .12s}
.btnrestart:hover{background:var(--surface);border-color:rgba(255,255,255,.22)}
.empty-msg{text-align:center;padding:2rem;color:var(--dim);font-size:.9rem}
</style>
</head>
<body>
<div class="shell">
<div class="topbar">
  <div class="brand"><span>GI Micro</span> Quiz — Dr. Colle</div>
  <div class="scorepill">Score: <b id="sp-s">0</b> / <b id="sp-t">0</b></div>
</div>
<div class="controls">
  <span class="ctrl-lbl">Focus:</span>
  <div class="ctlgrp" id="focusbtns"></div>
  <select class="qcount-sel" id="qcount" onchange="startQuiz()">
    <option value="10">10 Qs</option>
    <option value="20" selected>20 Qs</option>
    <option value="30">30 Qs</option>
    <option value="50">50 Qs</option>
    <option value="9999">All Qs</option>
  </select>
</div>
<div class="filterrow" id="filterrow"></div>
<div class="progrow">
  <div class="progtrack"><div class="progfill" id="prog" style="width:0%"></div></div>
  <div class="qlbl" id="qlbl">0 / 20</div>
</div>
<div id="qscreen">
  <div class="card">
    <div class="tagsrow"><div class="cattag" id="cattag">—</div><span class="focustag" id="focustag"></span></div>
    <div class="qtext" id="qtext">Loading…</div>
    <div class="opts" id="opts"></div>
    <div class="exp" id="exp"></div>
    <div class="cfooter">
      <div class="scorerow">Score: <b id="sv">0</b> / <b id="st">0</b></div>
      <button class="btnnext" id="btnnext" onclick="nextQ()">Next →</button>
    </div>
  </div>
</div>
<div id="rscreen">
  <div class="rcrd">
    <span class="remoji" id="remoji">🎉</span>
    <div class="rh" id="rheading">Quiz Complete</div>
    <div class="rsub" id="rsub"></div>
    <div class="bigscore" id="rscore">—</div>
    <div class="sdenom" id="rdenom"></div>
    <div class="statsrow">
      <div class="sbox"><span class="snum" style="color:var(--green2)" id="sc">—</span><span class="slbl">Correct</span></div>
      <div class="sbox"><span class="snum" style="color:var(--red2)" id="swrong">—</span><span class="slbl">Wrong</span></div>
      <div class="sbox"><span class="snum" style="color:var(--gold2)" id="spct">—</span><span class="slbl">Accuracy</span></div>
    </div>
    <div class="bksection" id="org-breakdown"></div>
    <div class="bksection" id="focus-breakdown"></div>
    <button class="btnrestart" onclick="startQuiz()">Shuffle new quiz ↺</button>
  </div>
</div>
</div>

<script>
const BANK = [

// ══ NOROVIRUS — Structure ══
{cat:"Norovirus",focus:"struct",
q:"What is the characteristic EM appearance of Caliciviridae virions?",
opts:["Wheel-like double capsid with spoke projections","6-pointed star shape","Brick-shaped with a smooth outer coat","Filamentous helical nucleocapsid"],
ans:1,
exp:"Caliciviridae have a characteristic 6-pointed star appearance on EM. They are small, non-enveloped icosahedral viruses with a capsid composed of a single virally encoded protein."},

{cat:"Norovirus",focus:"struct",
q:"Norovirus genome type and size:",
opts:["dsRNA, 10–12 segments, ~27 kb","Positive-sense ssRNA, ~7.6 kb","Negative-sense ssRNA, ~7.6 kb","Linear dsDNA, ~7.6 kb"],
ans:1,
exp:"Norovirus has a positive-sense ssRNA genome of 7.6 kb in a non-enveloped icosahedral capsid. The dsRNA/27 kb description belongs to Reoviridae (Rotavirus)."},

{cat:"Norovirus",focus:"struct",
q:"Why does Norovirus survive chlorine concentrations up to 10 ppm?",
opts:["It produces heat-stable spores that resist chemicals","It is non-enveloped — no lipid membrane to disrupt","It encodes a chlorine-neutralizing enzyme","It replicates inside host cells before disinfection can act"],
ans:1,
exp:"Norovirus is non-enveloped, lacking the lipid bilayer that chlorine and alcohols target. It survives freezing to 60°C and chlorine up to 10 ppm — above municipal water treatment levels."},

// ══ NOROVIRUS — Invasion ══
{cat:"Norovirus",focus:"invasion",
q:"Norovirus pathogenesis causes cellular vacuolization and monocyte infiltration in which site?",
opts:["Gastric mucosa","Proximal small intestine","Distal colon","Peyer's patches of the ileum"],
ans:1,
exp:"Norovirus lesions occur in the proximal small intestine. It spares the large intestine — fecal lymphocytes are NOT seen in stool, distinguishing it from invasive bacterial infections."},

{cat:"Norovirus",focus:"invasion",
q:"Which mechanism does Norovirus NOT use to cause diarrhea?",
opts:["Absorptive malfunction","Destruction of intestinal epithelium","Activation of adenylate cyclase","Delayed gastric emptying"],
ans:2,
exp:"Unlike cholera toxin and ETEC LT, Norovirus does NOT alter adenylate cyclase activity. Its diarrhea results from absorptive malfunction and epithelial destruction — the exact mechanism is still incompletely understood."},

// ══ NOROVIRUS — Symptoms ══
{cat:"Norovirus",focus:"symptoms",
q:"Which finding would be UNEXPECTED in a typical Norovirus infection?",
opts:["Acute onset vomiting","Watery, non-bloody diarrhea","Bloody stools with tenesmus","Low-grade fever or no fever"],
ans:2,
exp:"Norovirus causes acute vomiting, watery non-bloody diarrhea, cramps, and possible low-grade fever. Bloody stools with tenesmus indicate dysentery from invasive bacteria (e.g., Shigella) — not Norovirus."},

{cat:"Norovirus",focus:"symptoms",
q:"A patient with documented Norovirus antibodies contracts Norovirus again. Which statement best explains this?",
opts:["The first infection was misdiagnosed","Immunity is lifelong but only strain-specific","Serum antibody levels do not correlate with resistance; immunity is short-lived and strain-specific","Blood group O patients lose antibody more rapidly than others"],
ans:2,
exp:"Over 65% of Americans have serum antibodies to Norovirus, yet resistance does not correlate with antibody levels. Immunity is thought to be short-lived and strain-specific. Blood group O individuals are at higher risk of severe infection."},

// ══ NOROVIRUS — Timing ══
{cat:"Norovirus",focus:"timing",
q:"The incubation period for Norovirus ranges from:",
opts:["30 minutes to 6 hours","12 to 48 hours","3 to 5 days","7 to 14 days"],
ans:1,
exp:"Norovirus incubation is 24–48 hours, but can be as short as 12 hours — the timing reflects the viral dose ingested. Recovery occurs within 24–60 hours of clinical presentation."},

{cat:"Norovirus",focus:"timing",
q:"How does Norovirus illness duration compare to Rotavirus?",
opts:["Norovirus lasts longer — typically 5–8 days","Both resolve in about 24 hours","Norovirus is generally milder and shorter than Rotavirus","Rotavirus resolves faster because immunity is stronger"],
ans:2,
exp:"Norovirus is generally milder and of shorter duration than Rotavirus. Recovery occurs within 24–60 hours of clinical presentation with no severe sequelae in healthy individuals."},

// ══ NOROVIRUS — Spread ══
{cat:"Norovirus",focus:"spread",
q:"Which transmission route sets Norovirus apart from most other GI pathogens?",
opts:["Contaminated shellfish","Fomite contact","Aerosolized vomitus","Waterborne fecal-oral spread"],
ans:2,
exp:"Norovirus can spread via aerosolized vomitus — a route not commonly attributed to other GI pathogens. It also spreads fecal-orally and via direct contact and contaminated food or water."},

// ══ NOROVIRUS — Treatment ══
{cat:"Norovirus",focus:"treatment",
q:"Which is the correct management of Norovirus gastroenteritis?",
opts:["Oseltamivir started within 48 hours","Oral vancomycin to prevent bacterial superinfection","Supportive care — hydration and hygiene; no antiviral exists","RT-PCR-guided antiviral therapy using ribavirin"],
ans:2,
exp:"No specific antiviral treatment exists for Norovirus. Management is entirely supportive: maintain hydration and hygiene. RT-PCR assays can detect Norovirus in stool or emesis in special research settings but are not routine."},

// ══ ROTAVIRUS — Structure ══
{cat:"Rotavirus",focus:"struct",
q:"Rotavirus belongs to Reoviridae. Which correctly describes its genome?",
opts:["Positive ssRNA, enveloped, single capsid","dsRNA, 10–12 segments, non-enveloped double capsid","Negative ssRNA, enveloped, helical capsid","ssDNA, non-segmented, non-enveloped"],
ans:1,
exp:"Reoviridae (including Rotavirus) have double-stranded segmented RNA (10–12 segments, ~27 kb) in a distinctive non-enveloped icosahedral capsid with both an inner and an outer nucleocapsid."},

{cat:"Rotavirus",focus:"struct",
q:"How many serotypes of Rotavirus cause disease in humans?",
opts:["2 (A and B only)","4 (A, B, C, D)","6","8"],
ans:1,
exp:"Rotavirus has 4 serotypes (A–D) that cause human disease. By age 6, 60–90% of children have serum antibody to Rotavirus, maintained into adulthood."},

// ══ ROTAVIRUS — Invasion ══
{cat:"Rotavirus",focus:"invasion",
q:"After surviving the stomach, Rotavirus specifically targets:",
opts:["Colonic goblet cells","Intestinal columnar epithelial cells of the small intestine","M cells overlying Peyer's patches","Gastric parietal cells"],
ans:1,
exp:"Rotavirus adsorbs to, penetrates, and replicates in intestinal columnar epithelial cells, causing shortened and denuded villi. No viremia occurs — it stays localized to the intestine."},

{cat:"Rotavirus",focus:"invasion",
q:"Rotavirus causes diarrhea primarily through which mechanism?",
opts:["Activating adenylate cyclase, raising cAMP","Shortening and denuding intestinal villi, decreasing Na⁺, glucose, and water absorption","Invading colonic mucosa and triggering dysentery","Secreting a pore-forming toxin that ruptures enterocytes"],
ans:1,
exp:"Rotavirus causes necrotizing enterocolitis with shortened, denuded villi leading to decreased absorption of sodium, glucose, and water. It does NOT alter adenylate cyclase activity, distinguishing it mechanistically from cholera and ETEC."},

// ══ ROTAVIRUS — Symptoms ══
{cat:"Rotavirus",focus:"symptoms",
q:"Which symptom pattern is most characteristic of Rotavirus in children?",
opts:["Bloody dysentery with tenesmus and high fever","Vomiting, watery diarrhea, and dehydration lasting 4–8 days","Rice-water stools without vomiting or fever","Constipation followed by gradual fever rise"],
ans:1,
exp:"Rotavirus: vomiting + watery diarrhea + dehydration. Diarrhea lasts 4–8 days. One-third of children develop fever >102°F. Severe first infections (after 3 months) can cause electrolyte imbalance and metabolic acidosis requiring hospitalization."},

{cat:"Rotavirus",focus:"symptoms",
q:"When is the first Rotavirus infection considered most severe?",
opts:["At birth, before maternal antibodies wane","After 3 months of age — first infection at this stage causes the most severe disease","During the second infection in toddlers","In school-age children encountering a new serotype"],
ans:1,
exp:"The first Rotavirus infection after 3 months of age is most severe, causing dehydration, electrolyte imbalance, and metabolic acidosis. Fatal infections are more common in developing countries due to severe dehydration."},

// ══ ROTAVIRUS — Timing ══
{cat:"Rotavirus",focus:"timing",
q:"Rotavirus incubation period and peak shedding window:",
opts:["Incubation 6–12 hours; shedding before symptoms","Incubation 2–4 days; peak shedding 2–5 days after onset","Incubation 7–10 days; shedding only during recovery","Incubation 24 hours; shedding only after fever resolves"],
ans:1,
exp:"Rotavirus incubation: 2–4 days. Peak virus shedding occurs 2–5 days after symptom onset. Diarrhea lasts 4–8 days. Immunocompromised patients may have protracted diarrhea and chronic virus shedding."},

// ══ ROTAVIRUS — Spread ══
{cat:"Rotavirus",focus:"spread",
q:"What accounts for Rotavirus's extreme contagiousness in daycare settings?",
opts:["It is airborne and survives in ventilation systems","As few as 10 virions cause infection; survives weeks–months on fomites","It produces spores resistant to standard disinfection","It spreads via sexual contact in addition to fecal-oral route"],
ans:1,
exp:"Rotavirus requires as few as 10 virions to establish infection and survives weeks to months in the environment on fomites (e.g., toys). It also spreads nosocomially in nurseries and possibly via respiratory secretions."},

// ══ ROTAVIRUS — Treatment ══
{cat:"Rotavirus",focus:"treatment",
q:"Which correctly describes Rotavirus treatment and vaccination?",
opts:["Ribavirin antivirals given within 48 hours; 2-dose injectable vaccine","Supportive care only; 3-dose oral live-attenuated vaccine at 2, 4, and 6 months","IV acyclovir for severe cases; 1-dose vaccine at 12 months","No treatment and no vaccine currently exist"],
ans:1,
exp:"No specific antiviral exists for Rotavirus. Supportive: rehydration and electrolyte replacement. Two oral live-attenuated vaccines (RotaTeq, Rotarix) are given in 3 doses at 2, 4, and 6 months. Hospitalizations fell significantly since 2006/2008 introduction."},

// ══ CAMPYLOBACTER — Structure ══
{cat:"Campylobacter",focus:"struct",
q:"Campylobacter's microscopic morphology is best described as:",
opts:["Gram-positive cocci in clusters","Gram-negative spiral curved rods with seagull or S-shape","Gram-negative coccobacilli with bipolar safety-pin staining","Gram-positive endospore-forming rods in boxcar chains"],
ans:1,
exp:"Campylobacter are Gram-negative spiral curved rods with more pronounced curves than Vibrio. Two joined bacteria form a 'seagull' or 'S' shape. They are oxidase positive with polar flagella at one or both ends."},

{cat:"Campylobacter",focus:"struct",
q:"Campylobacter flagella contribute to virulence primarily by:",
opts:["Delivering enterotoxin directly into host cells","Enabling motility, chemotaxis, and adhesion required for gut colonization","Protecting against complement-mediated killing","Producing the main exotoxin causing secretory diarrhea"],
ans:1,
exp:"Campylobacter suspected virulence factors include adhesins, chemotaxis, motility, and flagella — all required for attachment and colonization of the gut. No definitive exotoxins causing diarrhea have been identified."},

// ══ CAMPYLOBACTER — Culture ══
{cat:"Campylobacter",focus:"culture",
q:"Which culture conditions are required to grow Campylobacter?",
opts:["37°C, blood agar, aerobic","42–43°C, Campy/Skirrow agar, microaerophilic","25–30°C, MacConkey agar, anaerobic","35°C, TCBS agar, 5% CO₂"],
ans:1,
exp:"Campylobacter grows best at 42–43°C (avian body temperature) on Campy/Skirrow agar in a microaerophilic environment. A vignette mentioning a 'special incubator' strongly suggests Campylobacter. It is easily destroyed by heat and chemical agents."},

{cat:"Campylobacter",focus:"culture",
q:"Which biochemical property distinguishes Campylobacter from Enterobacteriaceae on culture?",
opts:["It ferments lactose, producing pink colonies on MacConkey","It is oxidase positive, unlike the oxidase-negative Enterobacteriaceae","It produces H₂S, creating a black precipitate on TSI","It is indole positive, which rules out Salmonella"],
ans:1,
exp:"Campylobacter is oxidase positive — a key differentiator from Enterobacteriaceae (all oxidase negative). This prevents misidentification of Campylobacter as an enteric organism like E. coli on standard media."},

// ══ CAMPYLOBACTER — Invasion ══
{cat:"Campylobacter",focus:"invasion",
q:"How does Campylobacter spread within the intestinal mucosa after initial attachment?",
opts:["It polymerizes actin tails to spread cell-to-cell without extracellular exposure","It is endocytosed via vacuoles, replicates intracellularly, and moves via host microtubules","It secretes cholera-like toxin that diffuses through tight junctions","It invades only M cells, then spreads via lymphatics"],
ans:1,
exp:"Campylobacter attaches to epithelial cells, is endocytosed via endocytic vacuoles, replicates intracellularly, and moves through host cells via the microtubule network — causing acute PMN response, mucosal edema, ulcerations, and possible transient bacteremia."},

// ══ CAMPYLOBACTER — Virulence ══
{cat:"Campylobacter",focus:"virulence",
q:"The mechanism linking Campylobacter infection to Guillain-Barré syndrome is:",
opts:["Direct invasion of peripheral nerves by C. jejuni","Shiga-like toxin directly demyelinating peripheral axons","Molecular mimicry: antibodies to LPS (O:19) cross-react with peripheral nerve myelin","Endotoxin-driven TNF release that degrades myelin sheath"],
ans:2,
exp:"~40% of GBS cases are preceded by Campylobacter infection. The proposed mechanism is molecular mimicry: antibodies against C. jejuni LPS core antigen (O:19 serotype) cross-react with peripheral nerve myelin — similar to the rheumatic fever mechanism."},

// ══ CAMPYLOBACTER — Symptoms ══
{cat:"Campylobacter",focus:"symptoms",
q:"Which clinical feature helps distinguish C. jejuni from most viral gastroenteritis?",
opts:["Watery diarrhea with no fever, resolving in 24 hours","More than 10 bloody bowel movements per day with fever and pus in stool","Rapid onset vomiting followed by rice-water diarrhea","Constipation progressing to bloody stool over 2 weeks"],
ans:1,
exp:"C. jejuni causes fever, malaise, abdominal pain 1–7 days post-infection with >10 bloody, pus-containing bowel movements per day. Nausea is common but vomiting is minimal. Severe pain can mimic appendicitis. Illness lasts 3–5 days up to 2 weeks."},

{cat:"Campylobacter",focus:"symptoms",
q:"What neurological sequela occurs in approximately 1 in 1,000 Campylobacter cases?",
opts:["Bacterial meningitis from transient bacteremia","Guillain-Barré syndrome (acute demyelinating neuropathy)","Reye's syndrome from aspirin use during fever","Toxic shock syndrome from exotoxin release"],
ans:1,
exp:"GBS (acute demyelinating neuropathy) occurs in ~1:1,000 Campylobacter infections. Reiter's syndrome (urethritis, associated with HLA-B27) is another sequela. Patients also shed bacteria in feces for several weeks after recovery."},

// ══ CAMPYLOBACTER — Timing ══
{cat:"Campylobacter",focus:"timing",
q:"C. jejuni clinical symptoms typically begin how long after exposure?",
opts:["2–6 hours (rapid toxin-mediated onset)","1–7 days post-infection","2–3 weeks after ingestion","Only after establishment of a carrier state"],
ans:1,
exp:"C. jejuni presents 1–7 days post-infection with fever, malaise, abdominal pain, and diarrhea. The illness is usually acute and self-limiting, lasting 3–5 days (up to 1–2 weeks). Patients shed bacteria in feces for several weeks after recovery."},

// ══ CAMPYLOBACTER — Treatment ══
{cat:"Campylobacter",focus:"treatment",
q:"Which antibiotic class is used to treat prolonged Campylobacter infection (>1 week)?",
opts:["Beta-lactams (amoxicillin)","Macrolides or fluoroquinolones","TMP/SMX","Third-generation cephalosporins"],
ans:1,
exp:"Campylobacter is generally resistant to beta-lactams and TMP/SMX. Prolonged cases (>1 week) are treated with macrolides or fluoroquinolones. Most infections are self-limiting and require only supportive care."},

// ══ H. PYLORI — Structure ══
{cat:"H. pylori",focus:"struct",
q:"H. pylori's most prominent biochemical feature and its structural classification:",
opts:["Gram-positive coccus; oxidase positive; powerful catalase","Gram-negative slender curved rod with polar flagella; very powerful urease (PUNCH mnemonic)","Gram-negative coccobacillus; non-motile; H₂S positive","Gram-positive sporulating rod; very powerful urease"],
ans:1,
exp:"H. pylori is a Gram-negative slender curved rod (spiral-shaped, similar to Campylobacter) with polar flagella. Its most prominent biochemical feature: very powerful urease — its main virulence factor. PUNCH = Proteus, Ureaplasma, Nocardia, Cryptococcus, Helicobacter."},

// ══ H. PYLORI — Virulence ══
{cat:"H. pylori",focus:"virulence",
q:"H. pylori urease enables survival in the stomach by:",
opts:["Lysing gastric epithelial cells to enter the submucosa","Converting urea to CO₂ and ammonia, neutralizing the local microenvironment","Producing a capsule that resists gastric acid directly","Activating cAMP to cause secretory diarrhea"],
ans:1,
exp:"Urease hydrolyzes urea to CO₂ and ammonia, creating a neutral microenvironment around the bacteria within the acidic stomach — allowing survival and colonization. This is H. pylori's primary virulence factor."},

{cat:"H. pylori",focus:"virulence",
q:"The PAI cassette genes Vac and Cag in H. pylori are associated with:",
opts:["Encoding the urease subunits","Enhanced motility through the mucus layer","Cytotoxic effects, epithelial erosion, and increased risk of gastric adenocarcinoma","Production of heat-stable enterotoxin causing watery diarrhea"],
ans:2,
exp:"Vac and Cag proteins have cytotoxic effects causing epithelial cell erosion → fibrosis and cancer over years to decades. H. pylori is a WHO Class I carcinogen responsible for 85% of gastric ulcers, 95% of peptic ulcers, gastric adenocarcinoma, and gastric B-cell lymphoma."},

// ══ H. PYLORI — Culture ══
{cat:"H. pylori",focus:"culture",
q:"The definitive invasive test for H. pylori is:",
opts:["ELISA serology — identifies antibodies that remain elevated throughout infection","Endoscopy with biopsy — silver stained and cultured; biopsy urease test at 2–24 hours","C-13 urea breath test — most sensitive non-invasive test for all ages","Fecal antigen PCR — always preferred over invasive methods"],
ans:1,
exp:"Endoscopy with biopsy is the most sensitive test. Silver staining and culture are definitive. The biopsy urease test gives 70% accuracy at 2 hours and 90% at 24 hours. Histological examination shows telltale signs of gastric inflammation."},

{cat:"H. pylori",focus:"culture",
q:"The C-14 urea breath test is avoided in children because:",
opts:["It requires endoscopy, which is too invasive in children","It uses radioactive C-14; C-13 (non-radioactive) is the alternative for children","It cannot detect low-level infection common in children","It requires fasting for 48 hours, not tolerable in children"],
ans:1,
exp:"C-14 is radioactive. The test works by having the patient swallow labeled urea — if H. pylori urease is present, elevated C-14 appears in exhaled CO₂. Non-radioactive C-13 is used as the alternative in children."},

// ══ H. PYLORI — Invasion ══
{cat:"H. pylori",focus:"invasion",
q:"H. pylori preferentially colonizes which gastric region and how does it penetrate there?",
opts:["The fundus, using capsule to resist acid","The gastric antrum — flagella penetrate into mucus, urease neutralizes the local pH","The duodenal bulb, using type IV pili as primary adhesin","The body/corpus, using a pore-forming toxin to open tight junctions"],
ans:1,
exp:"H. pylori prefers the gastric antrum. Flagella penetrate into gastric mucus (especially lower-pH areas), and urease creates a neutral microenvironment. Colonization triggers mild to extensive inflammatory response depending on PAI gene expression."},

// ══ H. PYLORI — Symptoms ══
{cat:"H. pylori",focus:"symptoms",
q:"H. pylori initial infection causes acute gastritis lasting about 2 weeks. What typically follows?",
opts:["Complete resolution — the immune response clears the infection","Gastritis persists for months to years, often asymptomatic, before ulcer symptoms develop","Immediate progression to gastric adenocarcinoma within 6 months","Transition to bloody dysentery as bacteria invade the colonic mucosa"],
ans:1,
exp:"After acute achlorhydric gastritis (abdominal pain, nausea, flatulence, bad breath — up to 2 weeks), gastritis persists, often asymptomatically for years. Later, ulcer symptoms develop: epigastric pain, nausea, belching, vomiting. Perforation causes bleeding and peritonitis."},

// ══ H. PYLORI — Timing ══
{cat:"H. pylori",focus:"timing",
q:"What percentage of the U.S. population is infected with H. pylori, and what proportion of developing countries?",
opts:["5–10% USA; 40–50% developing countries","30–50% USA; ~100% in developing countries","<5% USA; 20% developing countries","70% USA; 80% developing countries"],
ans:1,
exp:"H. pylori infects 30–50% of the U.S. population and nearly 100% in developing countries. Infection rates are relatively low in childhood but increase to ~45% by adulthood. Prevalence is higher in low socioeconomic backgrounds."},

// ══ H. PYLORI — Treatment ══
{cat:"H. pylori",focus:"treatment",
q:"Standard H. pylori triple therapy is:",
opts:["Amoxicillin alone for 1 week","Clarithromycin + amoxicillin + omeprazole (PPI) for ≥2 weeks","Vancomycin + metronidazole for 10 days","Ciprofloxacin monotherapy for 14 days"],
ans:1,
exp:"Triple therapy: clarithromycin (macrolide) + amoxicillin (beta-lactam) + omeprazole (PPI) for at least 2 weeks. Prophylactic treatment is NOT recommended — only for patients with peptic ulcer disease or gastric lymphoma."},

// ══ VIBRIO CHOLERAE — Structure ══
{cat:"Vibrio cholerae",focus:"struct",
q:"V. cholerae morphology and key laboratory features:",
opts:["Gram-positive cocci; oxidase positive; blood agar colonies","Gram-negative comma-shaped curved rod; single polar flagellum; oxidase positive; yellow colonies on TCBS","Gram-negative straight rod; oxidase negative; pink colonies on MacConkey","Gram-negative non-motile coccobacillus; H₂S positive; colorless on MacConkey"],
ans:1,
exp:"V. cholerae: Gram-negative comma-shaped curved rod (2–4 μm), single polar flagellum, oxidase positive. Grows on TCBS agar as yellow/orange colonies. Oxidase-positive differentiates it from Enterobacteriaceae. On prolonged culture, becomes straight rod similar to enteric bacteria."},

// ══ VIBRIO CHOLERAE — Culture ══
{cat:"Vibrio cholerae",focus:"culture",
q:"V. cholerae is killed rapidly at pH <6. The clinical consequence of this is:",
opts:["Cholera is primarily a skin infection — gastric acid prevents GI disease","An infective dose of >10⁸ organisms is required; antacid use significantly lowers this threshold","V. cholerae cannot be grown in standard laboratory conditions","The organism can only infect immunocompromised patients with achlorhydria"],
ans:1,
exp:"V. cholerae is killed rapidly by stomach acid (pH <6). The large infective dose (>10⁸) is needed because most organisms are destroyed in the stomach. People using antacids or sodium bicarbonate raise gastric pH and dramatically reduce the required inoculum."},

// ══ VIBRIO CHOLERAE — Virulence ══
{cat:"Vibrio cholerae",focus:"virulence",
q:"The B subunit of cholera toxin consists of how many peptides and binds to what receptor?",
opts:["3 identical peptides binding GM-3 ganglioside","5 identical peptides binding GM-1 monosialoganglioside","2 identical peptides binding sodium channels","7 peptides binding tight junction proteins"],
ans:1,
exp:"The B subunit consists of 5 identical peptides that bind rapidly and irreversibly to GM-1 monosialoganglioside in the small intestine — anchoring the toxin so that A1 can translocate into the cell."},

{cat:"Vibrio cholerae",focus:"virulence",
q:"Cholera toxin A1 peptide causes diarrhea by:",
opts:["Forming pores that allow ions to escape the epithelial cell","ADP-ribosylating a GTP-binding protein → adenylate cyclase locked ON → massive ↑cAMP → Cl⁻/HCO₃⁻ secretion; Na⁺ absorption simultaneously inhibited","Inhibiting protein synthesis at the 60S ribosome → cell lysis","Acting as a superantigen that triggers cytokine-mediated fluid secretion"],
ans:1,
exp:"A1 peptide ADP-ribosylates the Gs protein → adenylate cyclase locked ON → massive cAMP rise → hypersecretion of Cl⁻ and HCO₃⁻ followed by water into the lumen. Na⁺ absorption is simultaneously inhibited. This is the mechanism of rice-water stools up to 20 L/day."},

{cat:"Vibrio cholerae",focus:"virulence",
q:"The Toxin-Coregulated Pilus (TCP) of V. cholerae is essential to virulence because:",
opts:["It is the structural component of cholera toxin","It brings vibrios into close contact with the intestinal epithelium for colonization; TCP-deficient mutants cannot colonize human volunteers","It protects against complement-mediated killing in the gut lumen","It encodes the flagellar motor needed for mucus penetration"],
ans:1,
exp:"TCP (type IV pili) acts as an adhesin — bringing V. cholerae into close contact with intestinal epithelial cells, essential for colonization. V. cholerae mutants defective in TCP production are completely deficient in colonizing human volunteers."},

// ══ VIBRIO CHOLERAE — Invasion ══
{cat:"Vibrio cholerae",focus:"invasion",
q:"Cholera is classified as non-invasive because:",
opts:["V. cholerae lacks virulence factors enabling cell entry","V. cholerae remains in the intestinal lumen and never enters the bloodstream — disease is entirely toxin-mediated","Gastric acid kills the organism before it can reach the epithelium","Secretory IgA blocks mucosal adherence in all infected patients"],
ans:1,
exp:"Cholera is a purely toxin-mediated, non-invasive infection. V. cholerae stays localized in the intestinal lumen — it never enters the bloodstream. This is why cholera produces massive secretory diarrhea without systemic bacteremia, fever, or dysentery."},

// ══ VIBRIO CHOLERAE — Symptoms ══
{cat:"Vibrio cholerae",focus:"symptoms",
q:"Which finding is characteristic of severe cholera but ABSENT in Shigella dysentery?",
opts:["Fever >102°F","Bloody mucoid stool with PMNs","Profuse rice-water stools up to 20 L/day with no fever","Tenesmus and abdominal cramping"],
ans:2,
exp:"Cholera: profuse rice-water stools (mucus + epithelial cells + vibrios), effortless vomiting, rapid dehydration, no fever (non-invasive). Shigella: bloody/mucoid dysentery WITH fever, tenesmus, PMNs in stool. The absence of fever and presence of massive secretory diarrhea distinguishes cholera."},

{cat:"Vibrio cholerae",focus:"symptoms",
q:"Physical exam findings in severe cholera include all of the following EXCEPT:",
opts:["Sunken eyes and cheeks","Poor skin turgor","High fever with nuchal rigidity","Thready peripheral pulse and cyanosis"],
ans:2,
exp:"Severe cholera: sunken eyes/cheeks, poor skin turgor, scaphoid abdomen, cyanosis, thready/absent pulse, barely audible high-pitched voice — all from profound dehydration. Fever and nuchal rigidity are NOT features; cholera is non-invasive with no CNS involvement."},

// ══ VIBRIO CHOLERAE — Timing ══
{cat:"Vibrio cholerae",focus:"timing",
q:"Cholera symptoms begin how long after ingesting an infective dose?",
opts:["Within 1–2 hours","8–72 hours","5–7 days","14–21 days"],
ans:1,
exp:"Symptoms begin abruptly 8–72 hours after ingestion of >10⁸ bacteria. Sudden onset: nausea, effortless vomiting, and profuse rice-water diarrhea with cramps — up to 20 L/day vs. the normal 100 mL/day output."},

// ══ VIBRIO CHOLERAE — Treatment ══
{cat:"Vibrio cholerae",focus:"treatment",
q:"In cholera, tetracycline is used as an adjunct to rehydration because it:",
opts:["Is the primary cure and reverses cholera toxin binding","Shortens the period of infection, reducing toxin production; fluid replacement remains the most critical intervention","Raises gastric pH to kill remaining Vibrio organisms","Prevents the carrier state in the gallbladder"],
ans:1,
exp:"Tetracycline shortens the infection period, reducing the source of cholera toxin — but fluid and electrolyte replacement (WHO ORS or IV) is the most critical therapy for survival. With prompt treatment, mortality falls from 20–60% to under 1%."},

// ══ E. COLI — Structure ══
{cat:"E. coli",focus:"struct",
q:"E. coli on EMB (eosin methylene blue) agar produces:",
opts:["Yellow/orange colonies","Colorless, non-lactose-fermenting colonies","Iridescent metallic green sheen","Black H₂S-precipitate colonies"],
ans:2,
exp:"E. coli produces an iridescent metallic green sheen on EMB agar due to lactose fermentation. On MacConkey: pink colonies. EHEC O157:H7 appears colorless on sorbitol-MacConkey (SMAC) — key vignette clue."},

{cat:"E. coli",focus:"struct",
q:"In the serotype O157:H7, what do the O and H designations represent?",
opts:["Oxygen tolerance (O) and hydrogen sulfide production (H)","Somatic LPS polysaccharide antigen (O) and flagellar antigen (H)","Outer membrane protein (O) and hemolysin antigen (H)","Osmotic resistance (O) and heat stability (H)"],
ans:1,
exp:"E. coli strains are serotyped by O (somatic LPS), H (flagellar), and K (capsule) antigens. O157:H7 is the EHEC serotype causing hemorrhagic colitis and HUS. LPS hinders complement; K antigen is anti-phagocytic."},

// ══ E. COLI — Virulence ══
{cat:"E. coli",focus:"virulence",
q:"ETEC causes watery diarrhea using which two toxins?",
opts:["Shiga toxin I and Shiga toxin II","Heat-labile toxin (LT) and heat-stable toxin (ST)","Toxin A (raises Ca²⁺) and Toxin B (cytopathic)","Verotoxin and listeriolysin O"],
ans:1,
exp:"ETEC uses LT (heat-labile toxin, activates adenylate cyclase like cholera toxin) and ST (heat-stable toxin). Both cause hypersecretion of fluids resulting in profuse watery diarrhea — no histological changes to GI mucosa occur."},

{cat:"E. coli",focus:"virulence",
q:"EHEC Shiga-like toxins (SLT I and II) cause pathology by:",
opts:["Activating adenylate cyclase to produce secretory diarrhea","Inhibiting protein synthesis by nicking the 28S rRNA of the 60S ribosome","Forming pores in the epithelial membrane causing cell lysis","ADP-ribosylating actin filaments in renal endothelial cells"],
ans:1,
exp:"SLT I and II inhibit protein synthesis (nick the 60S ribosome) → endothelial cell death in the renal microvasculature → HUS: acute renal failure + thrombocytopenia + microangiopathic hemolytic anemia. EHEC is the leading cause of acute renal failure in children under 5."},

{cat:"E. coli",focus:"virulence",
q:"Type III Secretion Systems (T3SS) used by E. coli, Shigella, and Salmonella function as:",
opts:["A vaccine delivery mechanism that attenuates the bacterium","A molecular syringe that injects effector proteins into host cells only upon direct cell contact","A flagellar motor for motility through intestinal mucus","An exotoxin channel that floods the extracellular space"],
ans:1,
exp:"T3SS are molecular syringes activated on host cell contact, injecting effector proteins directly into the cytoplasm. Used by EHEC (AE lesions), Shigella (entry/spreading), and Salmonella (invasion) to deliver virulence factors without extracellular exposure."},

// ══ E. COLI — Culture ══
{cat:"E. coli",focus:"culture",
q:"On sorbitol-MacConkey (SMAC) agar, EHEC O157:H7 appears as:",
opts:["Pink, sorbitol-fermenting colonies like most E. coli","Colorless, sorbitol non-fermenting colonies","Black H₂S-precipitate colonies","Yellow sucrose-fermenting colonies"],
ans:1,
exp:"EHEC O157:H7 is a sorbitol non-fermenter → colorless colonies on SMAC. Most other E. coli ferment sorbitol and appear pink. Colorless colonies on SMAC in a bloody-diarrhea vignette = key clue for EHEC."},

// ══ E. COLI — Invasion ══
{cat:"E. coli",focus:"invasion",
q:"EIEC causes dysentery by:",
opts:["Producing cholera-like LT and ST toxins causing watery secretory diarrhea","Penetrating the colonic epithelium causing fever, cramps, and bloody stools with leukocytes","Producing Shiga-like toxins causing HUS without mucosal invasion","Adhering via bundle-forming pili without invading the epithelium"],
ans:1,
exp:"EIEC penetrates the colonic epithelium causing dysentery: fever, cramps, blood and leukocytes in stool — similar to Shigella but less severe. Observed in underdeveloped countries. Anti-motility agents are contraindicated. Treat with TMP/SMX or fluoroquinolones."},

{cat:"E. coli",focus:"invasion",
q:"EPEC causes watery diarrhea through which mechanism?",
opts:["Secreting Shiga-like toxins that inhibit protein synthesis","Adhering to enterocytes via bundle-forming pili and destroying adjacent microvilli (attaching and effacing lesion) without classic exotoxins","Invading the colonic epithelium and spreading cell-to-cell via actin tails","Producing heat-stable toxin that raises intracellular cGMP"],
ans:1,
exp:"EPEC adheres to enterocyte plasma membranes using bundle-forming pili (Bfp) and causes destruction of adjacent microvilli — the 'attaching and effacing' (A/E) lesion. This causes loss of absorptive function and watery diarrhea without invasion or classic exotoxins."},

// ══ E. COLI — Symptoms ══
{cat:"E. coli",focus:"symptoms",
q:"A key clinical feature that distinguishes EHEC from invasive causes of bloody diarrhea (Shigella, Campylobacter) is:",
opts:["Higher fever (>104°F) in EHEC","Little or no fever in EHEC despite bloody diarrhea, because there is no mucosal invasion","More severe abdominal pain in Shigella than in EHEC","EHEC is always accompanied by vomiting; invasive organisms are not"],
ans:1,
exp:"EHEC produces bloody diarrhea through toxin production (SLT I and II) without mucosal invasion — so there is little or no fever despite bloody stool. Invasive organisms (Shigella, Campylobacter, EIEC) cause bloody diarrhea WITH fever and PMNs in stool."},

{cat:"E. coli",focus:"symptoms",
q:"Hemolytic Uremic Syndrome (HUS) from EHEC is the triad of:",
opts:["Fever, rash, and arthritis","Acute renal failure, thrombocytopenia, and microangiopathic hemolytic anemia","Bloody diarrhea, hemolysis, and splenomegaly","Hemolytic anemia, jaundice, and hepatomegaly"],
ans:1,
exp:"HUS = acute renal failure + thrombocytopenia + microangiopathic hemolytic anemia. Caused by Shiga-like toxin-mediated endothelial damage in the renal microvasculature. EHEC is the leading cause of acute renal failure in children under 5. Treat with hemodialysis and hemapheresis."},

// ══ E. COLI — Timing ══
{cat:"E. coli",focus:"timing",
q:"ETEC (Traveler's Diarrhea) onset and duration:",
opts:["Onset 2–6 hours; over by 12 hours","Onset 1–2 days; lasts 3–4 days","Onset 7–10 days; lasts 2–3 weeks","Onset 24–48 hours; can persist >14 days"],
ans:1,
exp:"ETEC: diarrhea develops 1–2 days after exposure and lasts 3–4 days. EAEC (enteroadherent E. coli) causes persistent watery diarrhea lasting >14 days via a 'stacked brick' adherence pattern. ETEC is rare in the USA due to high water sanitation."},

// ══ E. COLI — Treatment ══
{cat:"E. coli",focus:"treatment",
q:"Why are antibiotics contraindicated in EHEC, and what treatment IS used for severe HUS?",
opts:["Antibiotics cause anaphylaxis; HUS is treated with corticosteroids","Antibiotics increase Shiga toxin release, raising HUS risk; severe HUS requires hemodialysis and hemapheresis","Antibiotics prolong the carrier state in the gallbladder like in Salmonella","Antibiotics cause C. difficile colitis specifically in EHEC patients"],
ans:1,
exp:"Antibiotics in EHEC can trigger increased Shiga toxin release, significantly raising HUS risk. Anti-motility agents also increase GI adherence — both contraindicated. Severe EHEC/HUS requires hemodialysis and hemapheresis. ETEC, EIEC, and EPEC may be treated with TMP/SMX or fluoroquinolones."},

// ══ SHIGELLA — Structure ══

// ══ SHIGELLA — Invasion ══
{cat:"Shigella",focus:"invasion",
q:"Shigella's intracellular spread mechanism is:",
opts:["Replicating in endosomal vesicles, then budding out extracellularly","Invading M cells, entering the cytoplasm, and polymerizing actin tails to move laterally cell-to-cell without extracellular exposure","Using transient bacteremia to seed distant colonic segments","Secreting toxins extracellularly that diffuse through tight junctions"],
ans:1,
exp:"Shigellae invade M cells → cytoplasm entry → replication → polymerize actin 'jet trails' to spread laterally cell-to-cell without returning to the extracellular environment. This evades immune recognition and causes very shallow ulcers."},

// ══ SHIGELLA — Virulence ══
{cat:"Shigella",focus:"virulence",
q:"Shiga toxin causes pathology by:",
opts:["Raising intracellular cAMP, producing secretory diarrhea","Inhibiting protein synthesis — leading to endothelial damage in lamina propria capillaries, ischemia, and hemorrhagic colitis","ADP-ribosylating the Gs protein like cholera toxin","Forming pores directly in colonic epithelial cells"],

// ══ SHIGELLA — Symptoms ══
{cat:"Shigella",focus:"symptoms",
q:"Shigella dysentery is characterized by:",
opts:["Watery diarrhea only, no fever, resolves in 24 hours","Fever >101°F, nausea, crampy abdominal pain; watery diarrhea progressing to bloody/mucoid dysentery as bacteria invade the colon","Rice-water stools without fever or leukocytes","Constipation with gradual fever rise and rose spots on the trunk"],

// ══ SHIGELLA — Timing ══
{cat:"Shigella",focus:"timing",
q:"The infectious dose of Shigella dysenteriae compared to Salmonella gastroenteritis:",

// ══ SHIGELLA — Treatment ══
{cat:"Shigella",focus:"treatment",
q:"Severe Shigellosis is treated with:",
opts:["Cephalosporins — first-line for all species","Macrolides or fluoroquinolones; mild cases: supportive care only; anti-motility agents are contraindicated","TMP/SMX — universally effective","Beta-lactams — first-line because Shigella is sensitive to penicillins"],

exp:"Severe Shigellosis: macrolides or fluoroquinolones (resistance is becoming widespread). Mild cases: supportive care — fluid and electrolyte replacement. Anti-motility agents are contraindicated (also in EIEC and EHEC). Water treatment and sanitation prevent outbreaks."},

// ══ SALMONELLA — Structure ══
{cat:"Salmonella",focus:"struct",

// ══ SALMONELLA — Culture ══
{cat:"Salmonella",focus:"culture",
q:"On MacConkey agar and TSI slant, Salmonella produces:",

// ══ SALMONELLA — Invasion ══
{cat:"Salmonella",focus:"invasion",
q:"In uncomplicated Salmonella gastroenteritis, where are the bacteria localized?",
opts:["Stomach and duodenum; bacteremia is common","GI tract — terminal ileum; cultured from stool; PMNs in feces; no bacteremia in gastroenteritis","Entire colon; causes bloody dysentery similar to Shigella","Bloodstream — septicemia occurs in all cases of gastroenteritis"],

  {key:'struct',label:'Structure'},
  {key:'culture',label:'Culture/Lab'},
  {key:'invasion',label:'Invasion'},
  {key:'virulence',label:'Virulence'},
  {key:'timing',label:'Timing'},
  {key:'symptoms',label:'Symptoms'},
  {key:'treatment',label:'Treatment'},
  {key:'spread',label:'Spread'},
];
const FOCUS_COLORS={struct:'ft-struct',culture:'ft-culture',invasion:'ft-invasion',virulence:'ft-virulence',timing:'ft-timing',symptoms:'ft-symptoms',treatment:'ft-treatment',spread:'ft-spread'};
const FOCUS_LABELS={struct:'Structure',culture:'Culture / Lab',invasion:'Invasion',virulence:'Virulence',timing:'Timing',symptoms:'Symptoms',treatment:'Treatment',spread:'Spread'};
const CATS=[...new Set(BANK.map(q=>q.cat))];

let activeFocus='all',activeCats=new Set(CATS);
let questions=[],cur=0,score=0,answered=false;
let catStats={},focusStats={};

function shuffle(a){return [...a].sort(()=>Math.random()-.5)}

function buildFocusBtns(){
  const c=document.getElementById('focusbtns');c.innerHTML='';
  FOCUSES.forEach(f=>{
    const b=document.createElement('button');
    b.className='mbtn'+(f.key===activeFocus?' on':'');
    b.textContent=f.label;
    b.onclick=()=>{activeFocus=f.key;buildFocusBtns();startQuiz();};
    c.appendChild(b);
  });
}

function buildChips(){
  const row=document.getElementById('filterrow');row.innerHTML='';
  const allBtn=document.createElement('button');
  allBtn.className='chip all-on'+(activeCats.size===CATS.length?' on':'');
  allBtn.textContent='All organisms';
  allBtn.onclick=()=>{activeCats=new Set(CATS);buildChips();startQuiz();};
  row.appendChild(allBtn);
  CATS.forEach(cat=>{
    const c=document.createElement('button');
    c.className='chip'+(activeCats.has(cat)?' on':'');
    c.textContent=cat;
    c.onclick=()=>{
      if(activeCats.has(cat)&&activeCats.size===1)return;
      activeCats.has(cat)?activeCats.delete(cat):activeCats.add(cat);
      buildChips();startQuiz();
    };
    row.appendChild(c);
  });
}

function startQuiz(){
  let pool=BANK.filter(q=>activeCats.has(q.cat));
  if(activeFocus!=='all')pool=pool.filter(q=>q.focus===activeFocus);
  if(pool.length===0){
    document.getElementById('qscreen').innerHTML='<div class="empty-msg">No questions match — try different filters.</div>';
    document.getElementById('rscreen').style.display='none';
    return;
  }
  const n=parseInt(document.getElementById('qcount').value)||20;
  questions=shuffle(pool).slice(0,Math.min(n,pool.length));
  cur=0;score=0;answered=false;
  catStats={};focusStats={};
  questions.forEach(q=>{
    if(!catStats[q.cat])catStats[q.cat]={c:0,t:0};
    if(!focusStats[q.focus])focusStats[q.focus]={c:0,t:0};
    catStats[q.cat].t++;focusStats[q.focus].t++;
  });
  document.getElementById('sp-s').textContent='0';
  document.getElementById('sp-t').textContent='0';
  document.getElementById('rscreen').style.display='none';
  const qs=document.getElementById('qscreen');
  qs.style.display='block';
  qs.innerHTML=`<div class="card">
    <div class="tagsrow"><div class="cattag" id="cattag">—</div><span class="focustag" id="focustag"></span></div>
    <div class="qtext" id="qtext">Loading…</div>
    <div class="opts" id="opts"></div>
    <div class="exp" id="exp"></div>
    <div class="cfooter">
      <div class="scorerow">Score: <b id="sv">0</b> / <b id="st">0</b></div>
      <button class="btnnext" id="btnnext" onclick="nextQ()">Next →</button>
    </div>
  </div>`;
  renderQ();
}

function renderQ(){
  if(cur>=questions.length){showResult();return;}
  answered=false;
  const q=questions[cur];
  const total=questions.length;
  document.getElementById('cattag').textContent=q.cat;
  const ft=document.getElementById('focustag');
  ft.textContent=FOCUS_LABELS[q.focus]||q.focus;
  ft.className='focustag '+(FOCUS_COLORS[q.focus]||'');
  document.getElementById('qtext').textContent=q.q;
  document.getElementById('qlbl').textContent=`${cur+1} / ${total}`;
  document.getElementById('prog').style.width=`${(cur/total)*100}%`;
  document.getElementById('sp-t').textContent=cur;
  const exp=document.getElementById('exp');
  exp.textContent='';exp.className='exp';
  document.getElementById('btnnext').style.display='none';

  const opts=document.getElementById('opts');
  opts.innerHTML='';
  const LETS=['A','B','C','D'];
  const shuffled=shuffle(q.opts.map((text,i)=>({text,orig:i})));
  const correctIdx=shuffled.findIndex(o=>o.orig===q.ans);

  shuffled.forEach((opt,si)=>{
    const btn=document.createElement('button');
    btn.className='ob';
    btn.innerHTML=`<span class="ol">${LETS[si]}</span><span>${opt.text}</span>`;
    btn.onclick=()=>{
      if(answered)return;
      answered=true;
      const correct=(si===correctIdx);
      if(correct){score++;catStats[q.cat].c++;focusStats[q.focus].c++;}
      document.getElementById('sp-s').textContent=score;
      document.getElementById('sp-t').textContent=cur+1;
      document.getElementById('sv').textContent=score;
      document.getElementById('st').textContent=cur+1;
      shuffled.forEach((_,j)=>{
        const b=opts.children[j];
        b.classList.add('locked');
        if(j===correctIdx)b.classList.add(correct&&j===si?'correct':'reveal');
        else if(j===si&&!correct)b.classList.add('wrong');
      });
      exp.innerHTML=`<strong>Explanation:</strong> ${q.exp}`;
      exp.classList.add('show');
      document.getElementById('btnnext').style.display='inline-block';
    };
    opts.appendChild(btn);
  });
}

function nextQ(){cur++;renderQ();}

function showResult(){
  document.getElementById('qscreen').style.display='none';
  const rs=document.getElementById('rscreen');
  rs.style.display='block';
  const total=questions.length;
  const pct=Math.round((score/total)*100);
  document.getElementById('rscore').textContent=`${score}/${total}`;
  document.getElementById('rdenom').textContent=`${pct}% accuracy`;
  document.getElementById('sc').textContent=score;
  document.getElementById('swrong').textContent=total-score;
  document.getElementById('spct').textContent=`${pct}%`;
  document.getElementById('prog').style.width='100%';
  document.getElementById('qlbl').textContent=`${total} / ${total}`;
  let emoji,heading,sub;
  if(pct>=90){emoji='🏆';heading='Outstanding!';sub='Dr. Colle would be proud.';}
  else if(pct>=75){emoji='✅';heading='Great work!';sub='Solid command of GI microbiology.';}
  else if(pct>=60){emoji='📚';heading='Keep going';sub='Review the explanations and shuffle again.';}
  else{emoji='🔬';heading='Back to the slides';sub='Hit those lecture notes — you\'ve got this.';}
  document.getElementById('remoji').textContent=emoji;
  document.getElementById('rheading').textContent=heading;
  document.getElementById('rsub').textContent=sub;

  const ob=document.getElementById('org-breakdown');
  ob.innerHTML='<div class="bktitle">By organism</div>';
  Object.entries(catStats).sort((a,b)=>b[1].t-a[1].t).forEach(([cat,s])=>{
    const p=s.t>0?Math.round((s.c/s.t)*100):0;
    const barCol=p>=80?'var(--green)':p>=60?'var(--gold)':'var(--red)';
    ob.innerHTML+=`<div class="bkrow"><div class="bkname">${cat}</div><div class="bkbar-bg"><div class="bkbar-fill" style="width:${p}%;background:${barCol}"></div></div><div class="bkpct">${s.c}/${s.t}</div></div>`;
  });

  const fb=document.getElementById('focus-breakdown');
  fb.innerHTML='<div class="bktitle" style="margin-top:.8rem">By focus area</div>';
  Object.entries(focusStats).forEach(([focus,s])=>{
    const p=s.t>0?Math.round((s.c/s.t)*100):0;
    const barCol=p>=80?'var(--green)':p>=60?'var(--gold)':'var(--red)';
    const cls=FOCUS_COLORS[focus]||'';
    fb.innerHTML+=`<div class="fkrow"><span class="fkname focustag ${cls}" style="display:inline-flex">${FOCUS_LABELS[focus]||focus}</span><div class="fkbar-bg"><div class="fkbar-fill" style="width:${p}%;background:${barCol}"></div></div><div class="fkpct">${s.c}/${s.t}</div></div>`;
  });
}

buildFocusBtns();
buildChips();
startQuiz();
</script>
</body>
</html>
